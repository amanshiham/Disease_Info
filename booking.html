<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #ffb3ba, #a8e0ff);
            color: #333;
            overflow: hidden;
        }
        nav {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 2em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-top: 2em;
        }
        h2 {
            color: #ff7e5f;
            text-shadow: 1px 1px #ffb3ba;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ff7e5f;
        }
        .btn-primary {
            background-color: #ff7e5f;
            border: none;
            border-radius: 10px;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #ff5a3e;
        }
        .modal-content {
            border-radius: 15px;
        }
        footer {
            text-align: center;
            padding: 1em;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 15px;
            margin: 1em;
        }
    </style>
    <script>
        // Initialize token counter
        let tokenCounter = localStorage.getItem('tokenCounter') ? parseInt(localStorage.getItem('tokenCounter')) : 0;

        function confirmBooking(event) {
            event.preventDefault(); // Prevent the default form submission
            tokenCounter++; // Increment token counter
            localStorage.setItem('tokenCounter', tokenCounter); // Store token counter in localStorage

            // Show the modal
            $('#successModal').modal('show');
            // Display the token in the modal
            document.getElementById("tokenDisplay").textContent = `Your booking token is: ${tokenCounter}`;

            // Reset the form
            document.getElementById("bookingForm").reset();
        }
    </script>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="main.html">Disease Info</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="main.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="booking.html">Book an Appointment</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4">Book an Appointment</h2>
        <form id="bookingForm" action="appointments.php" method="POST">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" class="form-control" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="date">Appointment Date:</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea class="form-control" id="message" name="message" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit Appointment</button>
        </form>
                
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" role="dialog" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Booking Successful</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Your appointment has been successfully booked! We will contact you shortly.</p>
                    <p id="tokenDisplay"></p> <!-- Display the token here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>



    <footer class="footer">
        <p>&copy; 2024 Disease Info. All Rights Reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
