<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Disease Information</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
        }
        .contact-section {
            background-color: #ffcccb;
            padding: 40px 0;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .contact-icon {
            font-size: 2rem;
            margin: 20px;
            color: #333;
            transition: color 0.3s;
        }
        .contact-icon:hover {
            color: #ff6347; /* Tomato color */
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <h2 class="text-center mb-4">Contact Us</h2>
        
        <!-- Back Button -->
        <div class="text-center mb-4">
            <a href="main.html" class="btn btn-primary">Back to Home</a>
        </div>
        
        <div class="contact-section">
            <p>If you have any questions, feel free to reach out to us through the following platforms:</p>
            <div>
                <a href="mailto:team@example.com" class="contact-icon" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="https://facebook.com/yourpage" class="contact-icon" target="_blank" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="https://wa.me/9037679710" class="contact-icon" target="_blank" title="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="https://instagram.com/yourprofile" class="contact-icon" target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
            <p class="mt-4">We look forward to hearing from you!</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
